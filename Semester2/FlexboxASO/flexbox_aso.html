<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Align-Self and Order</title>
    <style>
      h1,
      h2 {
        text-align: center;
      }

      #container001 {
        border: 5px solid black;
        background-color: darkorange;
        margin: 1rem;
        display: flex;
        height: 700px;
      }
      #container002 {
        border: 5px solid rgb(14, 187, 83);
        background-color: rgb(91, 41, 192);
        margin: 1rem;
        display: flex;
        height: 700px;
      }
      #container003 {
        border: 5px solid rgb(19, 29, 142);
        background-color: rgb(59, 135, 131);
        margin: 1rem;
        display: flex;
        height: 700px;
        flex-direction: row;
        justify-content: space-around;
      }

      .box {
        border: 1px solid black;
        background-color: lightgreen;
        width: 100px;
        height: 100px;
        padding: 0.5rem;
      }
      #one{
        background-color: #ca1d1d;
        order: 5;
        align-self: center;
      }
      #two
      {background-color: #23d517;
    order:6;
    align-self: flex-end;
}
      #three
      {
        background-color: #504094;
        order:8;
        align-self: flex-start;
    }
      #four
      {
        background-color: #6767a2;
        order: 1;
        align-self: center;
      }
      #five
      {background-color: #175d66;
        order: 2;
        align-self: center;
    }
      #six
      {
        background-color: #82d26e;
        order: 3;
        align-self: flex-start;
      }
      #seven
      {
        background-color: #c497e9;
        order:4;
        align-self: flex-end;
      }
      #eight
      {
        background-color: #d67f16;
        order: 7;
        align-self: flex-end;
      }

      @media screen and (min-width: 800px) {
        body {
          background-color: lightslategrey;
        }
      }

      @media screen and (min-width: 1000px) {
        body {
          background-color: brown;
        }
      }
    </style>
  </head>

  <body>
    <h1>Flexbox</h1>
    <h2>Flex-Wrap - Align-Self and Order</h2>

    <h2>Container001</h2>
    <div id="container001">
      <div class="box" id="one">Item001</div>
      <div class="box" id="two">Item002</div>
      <div class="box" id="three">Item003</div>
      <div class="box" id="four">Item004</div>
      <div class="box" id="five">Item005</div>
      <div class="box" id="six">Item006</div>
      <div class="box" id="seven">Item007</div>
      <div class="box" id="eight">Item008</div>
      </div>
    <h2>Container002</h2>
    <div id="container002">
      <div class="box" id="one">Item001</div>
      <div class="box" id="two">Item002</div>

</html>
