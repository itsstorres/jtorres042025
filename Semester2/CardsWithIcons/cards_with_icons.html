<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=h1, initial-scale=1.0" />
    <title>Cards with Icons</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      body {
        background-color: rgb(145, 201, 201);
        color: rgb(255, 235, 210);
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
        line-height: 1.5;
      }
      h1,
      h2 {
        text-align: center;
      }
      .fbcards {
        background-color: rgb(116, 185, 185);
        border: 2px solid antiquewhite;
        padding: 1rem;
        max-width: 1200px;
        margin: auto;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .cardcircle {
        background-color: black;
        border-radius: 64px;
        width: 70px;
        height: 70px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
        margin: auto;
        border: 2px solid rgb(255, 235, 210);
      }
      .card {
        background-color: #f19be3;
        border: 2px solid rgb(255, 235, 210);
        padding: 1rem;
        text-align: center;
        border-radius: 8px;
        font-weight: bolder;
      }
      @media screen and (min-width: 700px) {
        .fbcards {
          flex-direction: row;
        }
      }
    </style>
  </head>
  <body>
    <h1>Cards With Icons</h1>
    <h2>Font Awesome</h2>

    <section class="fbcards">
      <article class="card">
        <div class="cardcircle">
          <i class="fa-solid fa-dog"></i>
        </div>

</html>
